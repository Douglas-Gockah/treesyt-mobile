<!DOCTYPE html>
<html>
<head>
  <!--
    TreeSyt Flutter Web entry point.
    $FLUTTER_BASE_HREF is replaced at build time by `flutter build web --base-href`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="TreeSyt — Field data collection app">

  <!-- PWA / iOS home-screen -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TreeSyt">
  <meta name="theme-color" content="#2E9B6A">

  <title>TreeSyt</title>

  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="favicon.png"/>

  <style>
    /* Prevent white flash before Flutter renders */
    body {
      margin: 0;
      background-color: #2E9B6A;
    }
  </style>
</head>
<body>
  <!-- Flutter 3.22+ bootstrap script (generated by `flutter build web`) -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
